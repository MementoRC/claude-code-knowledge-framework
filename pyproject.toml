[project]
name = "uckn-framework"
version = "1.0.0"
description = "Universal Claude Code Knowledge Network (UCKN) - AI-powered development knowledge management framework"
authors = [
    {name = "Claude Code Community", email = "noreply@anthropic.com"}
]
readme = "README.md"
license = {file = "LICENSE"}
keywords = ["ai", "knowledge-management", "ci-cd", "development", "claude-code"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Quality Assurance",
]

dependencies = [
    # Do NOT add dependencies unless they are only available on PYPI
]

[project.optional-dependencies]
    # Do NOT add dependencies unless they are only available on PYPI

[project.urls]
Homepage = "https://github.com/MementoRC/claude-code-knowledge-framework"
Documentation = "https://github.com/MementoRC/claude-code-knowledge-framework/docs"
Repository = "https://github.com/MementoRC/claude-code-knowledge-framework"
Issues = "https://github.com/MementoRC/claude-code-knowledge-framework/issues"
Changelog = "https://github.com/MementoRC/claude-code-knowledge-framework/blob/main/CHANGELOG.md"

[project.scripts]
uckn = "uckn.cli:main"
uckn-server = "uckn.server:main"
uckn-migrate = "uckn.migrate:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/uckn"]

[tool.pixi.project]
channels = ["conda-forge", "pytorch"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tool.pixi.dependencies]
# Core runtime dependencies
python = ">=3.12"
pip = "*"
# Core framework dependencies (ALL available on conda-forge)
fastapi = ">=0.100.0"
uvicorn = ">=0.20.0"
pydantic = ">=2.0.0"
numpy = ">=1.21.0"
pandas = ">=1.5.0"
httpx = ">=0.24.0"
click = ">=8.0.0"
rich = ">=13.0.0"
jinja2 = ">=3.0.0"
sentence-transformers = "*"
chromadb = "*"
toml = "*"
gitpython = "*"
mcp = "*"
websockets = "*"
anyio = "*"

[tool.pixi.pypi-dependencies]
# Do NOT add dependencies unless they are only available on PYPI

# TIER 1: Essential Quality Gates (ZERO-TOLERANCE)
[tool.pixi.feature.quality.dependencies]
pytest = ">=8.0.0"
pytest-cov = ">=4.0.0"
pytest-timeout = ">=2.1.0"
pytest-asyncio = ">=0.21.0"
ruff = ">=0.7.3"
mypy = ">=1.0.0"

# TIER 2: Extended Quality & Security
[tool.pixi.feature.quality-extended.dependencies]
bandit = ">=1.7.0"
safety = ">=2.3.0"
pre-commit = ">=3.0.0"
hypothesis = ">=6.0.0"

# TIER 3: CI/CD & Build Tools
[tool.pixi.feature.quality-ci.dependencies]
python-build = ">=1.0.0"
twine = ">=4.0.0"
coverage = ">=7.0.0"

# Development Tools (specialized)
[tool.pixi.feature.dev.dependencies]
pytest = "*"
pytest-cov = "*"
pytest-asyncio = "*"
ruff = "*"
black = "*"
mypy = "*"
pre-commit = "*"

[tool.pixi.feature.mcp.dependencies]
nodejs = ">=18"

[tool.pixi.feature.ml.dependencies]
pytorch = "*"
transformers = "*"
scikit-learn = ">=1.3.0"
matplotlib = ">=3.5.0"
seaborn = ">=0.11.0"

[tool.pixi.feature.ml.pypi-dependencies]
# Do NOT add dependencies unless they are only available on PYPI

[tool.pixi.feature.docs.dependencies]
# Documentation dependencies (ALL available on conda-forge)
mkdocs = "*"
mkdocs-material = "*"
mkdocstrings = "*"

[tool.pixi.feature.docs.pypi-dependencies]
# Do NOT add dependencies unless they are only available on PYPI

[tool.pixi.environments]
# Basic runtime environment
default = {features = ["ml"], solve-group = "default"}

# Tiered Quality Environments (compliant with AG guidance)
quality = {features = ["quality"], solve-group = "default"}
quality-extended = {features = ["quality", "quality-extended"], solve-group = "default"}
quality-full = {features = ["quality", "quality-extended", "quality-ci"], solve-group = "default"}

# Development environment (full quality + specialized tools)
dev = {features = ["quality", "quality-extended", "quality-ci", "dev", "ml", "mcp"], solve-group = "default"}

# CI environment (optimized for CI/CD)
ci = {features = ["quality", "quality-ci"], solve-group = "default"}

# Documentation environment  
docs = {features = ["docs"], solve-group = "default"}

[tool.pixi.tasks]
# Development tasks (STRICT COMPLIANCE: Use pip module with python)
install-editable = "python -m pip install -e ."
dev-setup = "python -m pip install -e ."

# TIER 1: Core Quality Gates (ZERO-TOLERANCE)
test = { cmd = "pytest tests/ -v", env = { CLAUDECODE = "0" } }
test-cov = { cmd = "pytest tests/ --cov=src/uckn --cov-report=html --cov-report=term --cov-report=xml --cov-report=json", env = { CLAUDECODE = "0" } }
lint = "ruff check src/ tests/ --select=F,E9"
lint-fix = "ruff check --fix src/ tests/"
format = "ruff format src/ tests/"
format-check = "ruff format --check src/ tests/"
format-diff = "ruff format --diff src/ tests/"
typecheck = "mypy src/uckn"

# Pre-commit Integration (CRITICAL for AG commands)
pre-commit = { cmd = "pre-commit run --all-files", env = { CLAUDECODE = "0" } }
install-pre-commit = { cmd = "pre-commit install --install-hooks", env = { CLAUDECODE = "0" } }

# Combined Quality Check (MANDATORY BEFORE COMMIT)
quality = { depends-on = ["test", "lint", "typecheck"] }

# Emergency Quality Fix (for CI failures)
emergency-fix = "ruff check --fix src/ tests/ && ruff format src/ tests/ && pytest tests/ -v"

# TIER 2: Security & Compliance Tasks
security-scan = "bandit -r src/ --severity-level high"
safety-check = "safety check"
static-analysis = { depends-on = ["security-scan", "safety-check"] }

# TIER 3: Complete Validation Pipeline (CRITICAL for AG commands)
check-all = { depends-on = ["quality", "static-analysis"] }

# CI-specific tasks (optimized for CI environments)
ci-test = { cmd = "pytest tests/ --cov=src/uckn --cov-report=xml --timeout=90", env = { CLAUDECODE = "0", ENVIRONMENT = "ci" } }
ci-lint = "ruff check src/ tests/ --output-format=github --select=F,E9"
ci-format-check = "ruff format --check src/ tests/"

# Framework tasks
start-server = "python -m uckn.server"
analyze-project = "uckn analyze ."
migrate-patterns = "uckn migrate --source .claude/knowledge"
init-project = "uckn init"

# Documentation
docs-serve = "mkdocs serve"
docs-build = "mkdocs build"

# Legacy CI tasks (replaced by enhanced versions above)

[tool.ruff]
target-version = "py310"
line-length = 88

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*" = ["F401", "F811"]

[tool.mypy]
python_version = "3.10"
check_untyped_defs = true
disallow_any_generics = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--disable-warnings",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "e2e: End-to-end tests",
    "slow: Slow tests",
]

[tool.coverage.run]
source = ["src/uckn"]
omit = [
    "tests/*",
    "src/uckn/__main__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
]
