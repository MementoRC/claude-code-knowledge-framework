[project]
name = "uckn-framework"
version = "1.0.0"
description = "Universal Claude Code Knowledge Network (UCKN) - AI-powered development knowledge management framework"
authors = [
    {name = "Claude Code Community", email = "noreply@anthropic.com"}
]
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.10"
keywords = ["ai", "knowledge-management", "ci-cd", "development", "claude-code"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Quality Assurance",
]

dependencies = [
    "sentence-transformers>=2.2.0",
    "chromadb>=0.4.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.20.0",
    "pydantic>=2.0.0",
    "numpy>=1.21.0",
    "pandas>=1.5.0",
    "httpx>=0.24.0",
    "toml>=0.10.0",
    "click>=8.0.0",
    "rich>=13.0.0",
    "gitpython>=3.1.0",
    "jinja2>=3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-benchmark>=4.0.0",
    "memory-profiler>=0.61.0",
    "ruff>=0.1.0",
    "black>=23.0.0",
    "mypy>=1.0.0",
    "pre-commit>=3.0.0",
    "aider-chat>=0.30.0",
]
mcp = [
    "mcp>=0.1.0",
    "websockets>=11.0.0",
    "anyio>=3.6.0",
]
ml = [
    "torch>=2.0.0",
    "transformers>=4.20.0",
    "scikit-learn>=1.3.0",
    "matplotlib>=3.5.0",
    "seaborn>=0.11.0",
]
docs = [
    "mkdocs>=1.5.0",
    "mkdocs-material>=9.0.0",
    "mkdocstrings[python]>=0.20.0",
]

[project.urls]
Homepage = "https://github.com/MementoRC/claude-code-knowledge-framework"
Documentation = "https://github.com/MementoRC/claude-code-knowledge-framework/docs"
Repository = "https://github.com/MementoRC/claude-code-knowledge-framework"
Issues = "https://github.com/MementoRC/claude-code-knowledge-framework/issues"
Changelog = "https://github.com/MementoRC/claude-code-knowledge-framework/blob/main/CHANGELOG.md"

[project.scripts]
uckn = "uckn.cli:main"
uckn-server = "uckn.server:main"
uckn-migrate = "uckn.migrate:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/uckn"]

[tool.pixi.project]
channels = ["conda-forge", "pytorch"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tool.pixi.dependencies]
python = ">=3.10"
pip = "*"

[tool.pixi.pypi-dependencies]
uckn-framework = {path = ".", editable = true}

[tool.pixi.feature.dev.dependencies]
pytest = "*"
pytest-cov = "*"
pytest-asyncio = "*"
pytest-benchmark = "*"
memory-profiler = "*"
ruff = "*"
black = "*"
mypy = "*"
pre-commit = "*"

[tool.pixi.feature.mcp.dependencies]
nodejs = ">=18"
npm = "*"

[tool.pixi.feature.ml.dependencies]
pytorch = "*"
sentence-transformers = "*"
chromadb = "*"

[tool.pixi.environments]
default = {features = ["ml"], solve-group = "default"}
dev = {features = ["dev", "ml", "mcp"], solve-group = "default"}
ci = {features = ["dev"], solve-group = "default"}
docs = {features = ["docs"], solve-group = "default"}

[tool.pixi.tasks]
# Development tasks
install = "pip install -e ."
dev = "pip install -e .[dev,mcp,ml]"
test = "pytest tests/ -v"
test-cov = "pytest tests/ --cov=src/uckn --cov-report=html --cov-report=term"
benchmark = "pytest tests/benchmarks/ --benchmark-only --benchmark-sort=mean"
benchmark-save = "pytest tests/benchmarks/ --benchmark-only --benchmark-save=baseline"
benchmark-compare = "pytest tests/benchmarks/ --benchmark-only --benchmark-compare"
lint = "ruff check src/ tests/"
format = "ruff format src/ tests/"
typecheck = "mypy src/uckn"
pre-commit = "pre-commit run --all-files"

# Framework tasks
start-server = "python -m uckn.server"
analyze-project = "uckn analyze ."
migrate-patterns = "uckn migrate --source .claude/knowledge"
init-project = "uckn init"

# Documentation
docs-serve = "mkdocs serve"
docs-build = "mkdocs build"

# CI/CD tasks
ci-test = {cmd = "pytest tests/ --cov=src/uckn --cov-report=xml", env = {ENVIRONMENT = "ci"}}
ci-lint = "ruff check src/ tests/ --output-format=github"
ci-format-check = "ruff format --check src/ tests/"

[tool.ruff]
target-version = "py310"
line-length = 88
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
]

[tool.ruff.per-file-ignores]
"tests/**/*" = ["F401", "F811"]

[tool.mypy]
python_version = "3.10"
check_untyped_defs = true
disallow_any_generics = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--disable-warnings",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "e2e: End-to-end tests",
    "slow: Slow tests",
    "benchmark: Performance benchmark tests",
]

[tool.pytest.benchmark]
disable = false
min_rounds = 5
max_time = 60
min_time = 0.01
sort = "mean"
group_by = "group"
columns = ["mean", "stddev", "rounds", "min", "max"]
histogram = true
save_data = true

[tool.coverage.run]
source = ["src/uckn"]
omit = [
    "tests/*",
    "src/uckn/__main__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
]
