[project]
name = "uckn-framework"
version = "1.0.0"
description = "Universal Claude Code Knowledge Network (UCKN) - AI-powered development knowledge management framework"
authors = [
    {name = "Claude Code Community", email = "noreply@anthropic.com"}
]
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.10"
keywords = ["ai", "knowledge-management", "ci-cd", "development", "claude-code"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Quality Assurance",
]

# Dependencies are managed by pixi in [tool.pixi.dependencies]
# dependencies = []

# Optional dependencies are managed by pixi features
# [project.optional-dependencies]

[project.urls]
Homepage = "https://github.com/MementoRC/claude-code-knowledge-framework"
Documentation = "https://github.com/MementoRC/claude-code-knowledge-framework/docs"
Repository = "https://github.com/MementoRC/claude-code-knowledge-framework"
Issues = "https://github.com/MementoRC/claude-code-knowledge-framework/issues"
Changelog = "https://github.com/MementoRC/claude-code-knowledge-framework/blob/main/CHANGELOG.md"

[project.scripts]
uckn = "uckn.cli:main"
uckn-server = "uckn.server:main"
uckn-migrate = "uckn.migrate:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/uckn"]

[tool.pixi.project]
channels = ["conda-forge"]
platforms = ["linux-64"]  # Development environment stays lean

[tool.pixi.dependencies]
# Core dependencies for linux-64 CI environment
python = ">=3.10"
alembic = "*"
click = "*"
fastapi = "*"
gitpython = "*"
httpx = "*"
jinja2 = "*"
psutil = "*"
pydantic = "*"
rich = "*"
ruff = "*"
sqlalchemy = "*"
toml = "*"
uvicorn = "*"


# ML/Heavy packages - test if they work with single platform:
# chromadb = "*"  # May still cause issues
# numpy = "*"
# pandas = "*"
# psycopg2 = "*"
# redis-py = "*"
# sentence-transformers = "*"

# This section moved to tiered quality features below

# ===== TIERED QUALITY FEATURES =====
# TIER 1: Essential Quality Gates (ZERO-TOLERANCE)
[tool.pixi.feature.quality.dependencies]
# Core Testing Framework
pytest = ">=8.0.0"
pytest-cov = ">=4.0.0"
pytest-timeout = ">=2.1.0"
pytest-asyncio = ">=0.21.0"
pytest-xdist = ">=3.3.0"

# Type Checking
mypy = ">=1.0.0"

# Database dependencies for tests
psycopg = "*"

# Note: ruff already in base dependencies for linting & formatting

# TIER 2: Extended Quality & Security
[tool.pixi.feature.quality-extended.dependencies]
# Security Scanning
bandit = ">=1.7.0"
safety = ">=3.0.0"

# Code Quality Analysis
radon = ">=6.0.0"
vulture = ">=2.7.0"

# Git Hooks
pre-commit = ">=3.0.0"

# TIER 3: CI/CD & Build
[tool.pixi.feature.quality-ci.dependencies]
# CI Reporting
pytest-json-report = ">=1.5.0"
pytest-html = ">=4.0.0"

# Build Tools
python-build = ">=0.10.0"
pip-audit = ">=2.6.0"

# Coverage Tools
coverage = ">=7.0.0"
# diff-cover = "*"  # Install separately in CI workflow due to dependency resolution issues

# ===== LEGACY DEVELOPMENT FEATURES =====
# Keep existing dev feature for specialized tools
[tool.pixi.feature.dev-specialized.dependencies]
black = "*"
locust = "*"
memory_profiler = "*"
pytest-benchmark = "*"

# Minimal CI dependencies (legacy)
[tool.pixi.feature.ci-deps.dependencies]
pytest = "*"
pytest-cov = "*"
pytest-timeout = "*"
pytest-asyncio = "*"
pytest-xdist = "*"
pytest-json-report = "*"
ruff = "*"

[tool.pixi.environments]
# Basic runtime environment
default = {solve-group = "default"}

# Quality gate environments (tiered approach)
quality = {features = ["quality"], solve-group = "default"}
quality-extended = {features = ["quality", "quality-extended"], solve-group = "default"}
quality-full = {features = ["quality", "quality-extended", "quality-ci"], solve-group = "default"}

# Development environment (full quality + specialized tools)
dev = {features = ["quality", "quality-extended", "quality-ci", "dev-specialized"], solve-group = "default"}

# CI environment (quality + CI reporting)
ci = {features = ["quality", "quality-ci"], solve-group = "default"}

# Legacy CI environment (for backward compatibility)
ci-legacy = {features = ["ci-deps"], solve-group = "default"}

[tool.pixi.tasks]
# ===== TIER 1: CORE DEVELOPMENT TASKS (ESSENTIAL) =====
# Installation & Setup
install-editable = "pip install -e ."
dev = "echo 'Development environment ready'"

# Testing (ZERO-TOLERANCE QUALITY GATES)
test = "pytest tests/ -v"
test-cov = "pytest tests/ --cov=src/uckn --cov-report=term-missing --cov-report=xml"
test-unit = "pytest tests/unit/ -v"
test-integration = "pytest tests/integration/ -v"
test-e2e = "pytest tests/e2e/ -v"

# Quality Gates (CRITICAL - MUST PASS)
lint = "ruff check src/ tests/ --select=F,E9"
lint-fix = "ruff check --fix src/ tests/"
format = "ruff format src/ tests/"
format-check = "ruff format --check src/ tests/"
format-diff = "ruff format --diff src/ tests/"
typecheck = "mypy src/uckn"

# Combined Quality Check
quality = { depends-on = ["test", "lint", "typecheck"] }

# ===== TIER 2: SECURITY & COMPLIANCE TASKS =====
# Security Scanning
security-scan = "bandit -r src/ --severity-level high"
safety-check = "safety check"
complexity-check = "radon cc src/ --min B"
dead-code-check = "vulture src/ --min-confidence 80"

# Static Analysis Suite
static-analysis = { depends-on = ["security-scan", "safety-check", "complexity-check", "dead-code-check"] }

# Comprehensive Check
check-all = { depends-on = ["quality", "static-analysis"] }

# ===== TIER 3: CI/CD & DEPLOYMENT TASKS =====
# CI-specific variants
ci-install = "pip install -e ."
ci-test = { cmd = "pytest tests/ --cov=src/uckn --cov-report=xml --timeout=90", env = { ENVIRONMENT = "ci" } }
ci-test-matrix = "pytest tests/"
ci-lint = "ruff check src/ tests/ --output-format=github"
ci-format-check = "ruff format --check src/ tests/"

# Build & Deploy
build = "python -m build"
clean = "rm -rf __pycache__ .pytest_cache .coverage htmlcov .ruff_cache dist build"

# Pre-commit Integration
pre-commit = "pre-commit run --all-files"
install-pre-commit = "pre-commit install --install-hooks"

# ===== LEGACY/SPECIALIZED TASKS =====
# Keep existing specialized tasks
benchmark = "pytest tests/benchmarks/ --benchmark-only --benchmark-sort=mean"
benchmark-save = "pytest tests/benchmarks/ --benchmark-only --benchmark-save=baseline"
benchmark-compare = "pytest tests/benchmarks/ --benchmark-only --benchmark-compare"
load-test = "cd tests/load_tests && locust -f locustfile.py --host=http://localhost:8000"
load-test-ui = "cd tests/load_tests && locust -f locustfile.py --host=http://localhost:8000 --web-host=0.0.0.0"
load-test-headless = "cd tests/load_tests && locust -f locustfile.py --host=http://localhost:8000 --headless --users=100 --spawn-rate=10 --run-time=2m"
test-coverage = "pytest tests/ --cov=src/uckn --cov-branch --cov-report=html --cov-report=xml --cov-report=json --cov-report=term-missing"
test-coverage-json = "pytest tests/ --cov=src/uckn --cov-branch --cov-report=json --json-report --json-report-file=pytest-report.json"
quality-metrics = "python tests/quality_metrics/quality_dashboard.py --summary"
quality-gate = "python tests/quality_metrics/quality_dashboard.py --check-gate --fail-under=40"
coverage-trend = "python tests/quality_metrics/coverage_analysis.py"

# Framework tasks
start-server = "python -m uckn.server"
analyze-project = "uckn analyze ."
migrate-patterns = "uckn migrate --source .claude/knowledge"
init-project = "uckn init"
db-migrate = "alembic -c src/uckn/storage/migrations/alembic.ini upgrade head"

# Documentation
docs-serve = "mkdocs serve"
docs-build = "mkdocs build"

# MCP Server tasks
mcp-server = { cmd = "python -m uckn.mcp.universal_knowledge_server", env = { PYTHONPATH = "src" } }

[tool.ruff]
target-version = "py310"
line-length = 88

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
    "UP007",  # Use X | Y for type annotations (requires Python 3.10+)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*" = ["F401", "F811", "F403"]

[tool.mypy]
python_version = "3.10"
# Temporarily simplified configuration for CI stability
# TODO: Re-enable systematic type checking in follow-up PR
ignore_missing_imports = true
follow_imports = "silent"
warn_no_return = false
warn_return_any = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false
disallow_untyped_calls = false
disallow_untyped_decorators = false
disallow_any_generics = false
# Disable most warnings temporarily
show_error_codes = false
namespace_packages = true

[[tool.mypy.overrides]]
module = ["uckn.core.atoms.tech_stack_detector"]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
pythonpath = ["src"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--disable-warnings",
    "--timeout=120",  # 2 minutes per test (optimized for CI)
    "--timeout-method=thread",  # More robust for async/code with subprocesses
    "-ra",
]
timeout = 120  # 2 minutes default timeout for all tests (pytest-timeout)
timeout_method = "thread"
markers = [
    "unit: Unit tests (fast, <30s timeout)",
    "integration: Integration tests (medium, <120s timeout)",
    "e2e: End-to-end tests (slow, <300s timeout)",
    "slow: Slow tests (extended timeout)",
    "benchmark: Performance benchmark tests (no timeout)",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.pytest.benchmark]
disable = false
min_rounds = 5
max_time = 60
min_time = 0.01
sort = "mean"
group_by = "group"
columns = ["mean", "stddev", "rounds", "min", "max"]
histogram = true
save_data = true

[tool.coverage.run]
source = ["src/uckn"]
branch = true
parallel = true
# context = ${CONTEXT}
omit = [
    "tests/*",
    "src/uckn/__main__.py",
]
# dynamic_context = test_function

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]
show_missing = true
skip_covered = false
precision = 2
fail_under = 90

[tool.coverage.html]
directory = "htmlcov"
title = "UCKN Coverage Report"

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.json]
output = "coverage.json"

[tool.coverage.markdown]
output = "coverage.md"

[tool.coverage.paths]
source = [
    "src/uckn",
    "*/src/uckn"
]

[tool.coverage.differential]
compare_branch = "main"
fail_under = 90
