name: Comprehensive Testing

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC

jobs:
  full-test-suite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12'] # Example matrix
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.1.0
        with:
          pixi-version: latest
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pixi run ci-dev # Changed from 'dev' to 'ci-dev' for CI environment

      - name: Run full test suite
        run: pixi run ci-test

      - name: Generate coverage report
        run: pixi run test-coverage-json
