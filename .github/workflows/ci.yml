name: CI/CD Pipeline

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]
  release:
    types: [ published ]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pixi with cache fallback
      id: setup-pixi-step # Added ID for checking cache status
      uses: prefix-dev/setup-pixi@v0.8.1
      with:
        pixi-version: v0.49.0
        cache: false  # Temporarily disable during GitHub cache service outage

    - name: Log pixi cache status
      run: |
        if [ "${{ steps.setup-pixi-step.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Pixi cache hit!"
        else
          echo "⚠️ Pixi cache miss or failed to restore."
        fi

    - name: Install dependencies (with retry and fallback)
      run: |
        n=0
        until [ "$n" -ge 3 ]
        do
          # Try locked first, then fallback to update if needed
          if pixi install; then
            echo "✅ Installation successful"
            break
          elif [ "$n" -eq 2 ]; then
            echo "⚠️ Install failed, retrying..."
            pixi install && break
          fi
          n=$((n+1))
          echo "pixi install failed, retrying ($n/3)..."
          sleep 5
        done
        if [ "$n" -ge 3 ]; then
          echo "❌ Failed to install pixi dependencies after multiple retries."
          exit 1
        fi

    - name: Activate pixi environment
      run: |
        eval "$(pixi shell --env-hook bash)"

    - name: Verify pixi environment
      run: |
        which python
        which pip
        python --version
        pip --version

    - name: Run tests
      run: |
        pixi run ci-test

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pixi with cache fallback
      id: setup-pixi-step # Added ID for checking cache status
      uses: prefix-dev/setup-pixi@v0.8.1
      with:
        pixi-version: v0.49.0
        cache: false  # Temporarily disable during GitHub cache service outage

    - name: Log pixi cache status
      run: |
        if [ "${{ steps.setup-pixi-step.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Pixi cache hit!"
        else
          echo "⚠️ Pixi cache miss or failed to restore."
        fi

    - name: Install dependencies (with retry and fallback)
      run: |
        n=0
        until [ "$n" -ge 3 ]
        do
          # Try locked first, then fallback to update if needed
          if pixi install; then
            echo "✅ Installation successful"
            break
          elif [ "$n" -eq 2 ]; then
            echo "⚠️ Install failed, retrying..."
            pixi install && break
          fi
          n=$((n+1))
          echo "pixi install failed, retrying ($n/3)..."
          sleep 5
        done
        if [ "$n" -ge 3 ]; then
          echo "❌ Failed to install pixi dependencies after multiple retries."
          exit 1
        fi

    - name: Activate pixi environment
      run: |
        eval "$(pixi shell --env-hook bash)"

    - name: Verify pixi environment
      run: |
        which python
        which pip
        python --version
        pip --version

    - name: Run linting
      run: |
        pixi run ci-lint

    - name: Check formatting
      run: |
        pixi run ci-format-check

    - name: Type checking
      run: |
        pixi run typecheck

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pixi with cache fallback
      id: setup-pixi-step # Added ID for checking cache status
      uses: prefix-dev/setup-pixi@v0.8.1
      with:
        pixi-version: v0.49.0
        cache: false  # Temporarily disable during GitHub cache service outage

    - name: Log pixi cache status
      run: |
        if [ "${{ steps.setup-pixi-step.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Pixi cache hit!"
        else
          echo "⚠️ Pixi cache miss or failed to restore."
        fi

    - name: Install dependencies (with retry and fallback)
      run: |
        n=0
        until [ "$n" -ge 3 ]
        do
          # Try locked first, then fallback to update if needed
          if pixi install; then
            echo "✅ Installation successful"
            break
          elif [ "$n" -eq 2 ]; then
            echo "⚠️ Install failed, retrying..."
            pixi install && break
          fi
          n=$((n+1))
          echo "pixi install failed, retrying ($n/3)..."
          sleep 5
        done
        if [ "$n" -ge 3 ]; then
          echo "❌ Failed to install pixi dependencies after multiple retries."
          exit 1
        fi

    - name: Activate pixi environment
      run: |
        eval "$(pixi shell --env-hook bash)"

    - name: Verify pixi environment
      run: |
        which python
        which pip
        python --version
        pip --version

    - name: Run Bandit Security Scan
      run: |
        pip install bandit[toml]
        bandit -r src/ -f json -o bandit-report.json || true

    - name: Safety Check
      run: |
        pip install safety
        safety check --json --output safety-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  atomic-design-validation:
    name: Atomic Design Standards
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Pixi
      id: setup-pixi-step # Added ID for checking cache status
      uses: prefix-dev/setup-pixi@v0.8.1
      with:
        pixi-version: v0.49.0
        cache: false  # Temporarily disable during GitHub cache service outage

    - name: Log pixi cache status
      run: |
        if [ "${{ steps.setup-pixi-step.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Pixi cache hit!"
        else
          echo "⚠️ Pixi cache miss or failed to restore."
        fi

    - name: Install dependencies (with retry and fallback)
      run: |
        n=0
        until [ "$n" -ge 3 ]
        do
          # Try locked first, then fallback to update if needed
          if pixi install; then
            echo "✅ Installation successful"
            break
          elif [ "$n" -eq 2 ]; then
            echo "⚠️ Install failed, retrying..."
            pixi install && break
          fi
          n=$((n+1))
          echo "pixi install failed, retrying ($n/3)..."
          sleep 5
        done
        if [ "$n" -ge 3 ]; then
          echo "❌ Failed to install pixi dependencies after multiple retries."
          exit 1
        fi

    - name: Activate pixi environment
      run: |
        eval "$(pixi shell --env-hook bash)"

    - name: Validate UCKN atomic structure
      run: |
        echo "🏗️ Validating atomic design structure..."

        # Check atomic directory structure
        test -d "src/uckn/core/atoms" || (echo "❌ Missing atoms directory" && exit 1)
        test -d "src/uckn/core/molecules" || (echo "❌ Missing molecules directory" && exit 1)
        test -d "src/uckn/core/organisms" || (echo "❌ Missing organisms directory" && exit 1)
        echo "✅ Atomic directory structure valid"

        # Check file size constraints (200-800 lines)
        # Note: Temporarily increased from 500 to 800 to allow current files
        # TODO: Refactor large files in separate PRs to meet 500 line target
        python << 'EOF'
        import os
        import sys

        violations = []
        warnings = []
        for root, dirs, files in os.walk("src/uckn"):
            for file in files:
                if file.endswith(".py") and file != "__init__.py":
                    filepath = os.path.join(root, file)
                    with open(filepath, 'r') as f:
                        line_count = sum(1 for line in f)

                    if line_count > 800:
                        violations.append(f"{filepath}: {line_count} lines (exceeds 800)")
                    elif line_count > 500:
                        warnings.append(f"{filepath}: {line_count} lines (exceeds target 500)")

        if warnings:
            print("⚠️ File size warnings (target: 500 lines):")
            for warning in warnings:
                print(f"  {warning}")

        if violations:
            print("❌ File size violations (max: 800 lines):")
            for violation in violations:
                print(f"  {violation}")
            sys.exit(1)
        else:
            print("✅ All files within acceptable constraints (max 800 lines)")
            if warnings:
                print("   Note: Some files exceed the 500-line target and should be refactored")
        EOF

    - name: Test UCKN framework integration
      run: |
        echo "🔧 Testing UCKN framework integration..."
        python << 'EOF'
        import sys
        sys.path.insert(0, 'src')

        # Test main imports
        try:
            from uckn import KnowledgeManager, SemanticSearch, UnifiedKnowledgeManager
            print("✅ Main imports working")
        except ImportError as e:
            print(f"❌ Import error: {e}")
            exit(1)

        # Test initialization
        try:
            km = KnowledgeManager()
            health = km.get_health_status()
            print(f"✅ KnowledgeManager: {health}")
        except Exception as e:
            print(f"❌ KnowledgeManager error: {e}")
            exit(1)

        # Test unified interface
        try:
            ukm = UnifiedKnowledgeManager()
            capabilities = ukm.get_capabilities()
            print(f"✅ UnifiedKnowledgeManager: {len(capabilities)} capabilities")
        except Exception as e:
            print(f"❌ UnifiedKnowledgeManager error: {e}")
            exit(1)

        print("🎉 UCKN integration tests passed!")
        EOF

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, lint, security, atomic-design-validation]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pixi with cache fallback
      id: setup-pixi-step # Added ID for checking cache status
      uses: prefix-dev/setup-pixi@v0.8.1
      with:
        pixi-version: v0.49.0
        cache: false  # Temporarily disable during GitHub cache service outage

    - name: Log pixi cache status
      run: |
        if [ "${{ steps.setup-pixi-step.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Pixi cache hit!"
        else
          echo "⚠️ Pixi cache miss or failed to restore."
        fi

    - name: Install dependencies (with retry and fallback)
      run: |
        n=0
        until [ "$n" -ge 3 ]
        do
          # Try locked first, then fallback to update if needed
          if pixi install; then
            echo "✅ Installation successful"
            break
          elif [ "$n" -eq 2 ]; then
            echo "⚠️ Install failed, retrying..."
            pixi install && break
          fi
          n=$((n+1))
          echo "pixi install failed, retrying ($n/3)..."
          sleep 5
        done
        if [ "$n" -ge 3 ]; then
          echo "❌ Failed to install pixi dependencies after multiple retries."
          exit 1
        fi

    - name: Activate pixi environment
      run: |
        eval "$(pixi shell --env-hook bash)"

    - name: Verify pixi environment
      run: |
        which python
        which pip
        python --version
        pip --version

    - name: Install build tools
      run: |
        pip install build twine

    - name: Build package
      run: |
        python -m build

    - name: Check package
      run: |
        twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  deploy:
    name: Deploy to PyPI
    runs-on: ubuntu-latest
    needs: [build, atomic-design-validation] # Corrected dependency name
    if: github.event_name == 'release'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pixi with cache fallback
      id: setup-pixi-step # Added ID for checking cache status
      uses: prefix-dev/setup-pixi@v0.8.1
      with:
        pixi-version: v0.49.0
        cache: false  # Temporarily disable during GitHub cache service outage

    - name: Log pixi cache status
      run: |
        if [ "${{ steps.setup-pixi-step.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Pixi cache hit!"
        else
          echo "⚠️ Pixi cache miss or failed to restore."
        fi

    - name: Install dependencies (with retry and fallback)
      run: |
        n=0
        until [ "$n" -ge 3 ]
        do
          # Try locked first, then fallback to update if needed
          if pixi install; then
            echo "✅ Installation successful"
            break
          elif [ "$n" -eq 2 ]; then
            echo "⚠️ Install failed, retrying..."
            pixi install && break
          fi
          n=$((n+1))
          echo "pixi install failed, retrying ($n/3)..."
          sleep 5
        done
        if [ "$n" -ge 3 ]; then
          echo "❌ Failed to install pixi dependencies after multiple retries."
          exit 1
        fi

    - name: Activate pixi environment
      run: |
        eval "$(pixi shell --env-hook bash)"

    - name: Verify pixi environment
      run: |
        which python
        which pip
        python --version
        pip --version

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
