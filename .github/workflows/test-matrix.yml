name: Test Matrix

on:
  push:
    branches: [main, development]
    paths-ignore:
      - '**.md'
      - '**/docs/**'
  pull_request:
    branches: [main, development]
    paths-ignore:
      - '**.md'
      - '**/docs/**'
  workflow_dispatch:

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        test-type: [unit, integration, e2e]
    env:
      ENVIRONMENT: ci
      PYTHONUNBUFFERED: 1
      PIXI_ENV: ci # Kept: This job explicitly targets the 'ci' environment for its primary installation.
    steps:
      - uses: actions/checkout@v4

      - name: Setup pixi with cache fallback
        id: setup-pixi
        uses: prefix-dev/setup-pixi@v0.8.10
        with:
          pixi-version: latest
          cache: true

      - name: Secondary cache fallback when pixi cache fails
        if: steps.setup-pixi.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.pixi/cache
            ~/.cache/pip
            .pixi
          key: pixi-fallback-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pixi-fallback-${{ runner.os }}-

      - name: Install dependencies with pixi fallback to pip
        run: |
          # Try pixi first with timeout protection
          if timeout 60 pixi install --frozen=false -e ci; then
            echo "✅ Pixi installation successful"
            echo "INSTALL_METHOD=pixi" >> $GITHUB_ENV
          else
            echo "⚠️ Pixi failed or timed out, falling back to pip"
            echo "INSTALL_METHOD=pip" >> $GITHUB_ENV
            
            # Set up Python environment
            python -m pip install --upgrade pip
            
            # Install core dependencies for CI
            pip install pytest pytest-cov pytest-timeout pytest-asyncio pytest-xdist pytest-json-report ruff
            pip install click fastapi uvicorn pydantic
          fi

      - name: Verify installation
        run: |
          if [ "$INSTALL_METHOD" = "pixi" ]; then
            pixi run -e ci python --version
            pixi run -e ci pip --version
          else
            python --version
            pip --version
          fi

      - name: Select tests by marker
        id: select-tests
        shell: bash
        run: |
          if [[ "${{ matrix.test-type }}" == "unit" ]]; then
            echo "PYTEST_MARK=unit" >> $GITHUB_ENV
          elif [[ "${{ matrix.test-type }}" == "integration" ]]; then
            echo "PYTEST_MARK=integration" >> $GITHUB_ENV
          elif [[ "${{ matrix.test-type }}" == "e2e" ]]; then
            echo "PYTEST_MARK=e2e" >> $GITHUB_ENV
          fi

      - name: Run selected tests
        run: |
          # Set PYTHONPATH for imports
          export PYTHONPATH="${PWD}/src:${PYTHONPATH}"
          
          if [ "$INSTALL_METHOD" = "pixi" ]; then
            if [[ -n "$PYTEST_MARK" ]]; then
              pixi run -e ci pytest tests/ -m "$PYTEST_MARK" --json-report --json-report-file=pytest-${{ matrix.test-type }}.json
            else
              pixi run -e ci pytest tests/ --json-report --json-report-file=pytest-${{ matrix.test-type }}.json
            fi
          else
            if [[ -n "$PYTEST_MARK" ]]; then
              pytest tests/ -m "$PYTEST_MARK" --json-report --json-report-file=pytest-${{ matrix.test-type }}.json
            else
              pytest tests/ --json-report --json-report-file=pytest-${{ matrix.test-type }}.json
            fi
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}-${{ matrix.test-type }}
          path: pytest-${{ matrix.test-type }}.json

  aggregate-results:
    needs: test-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Aggregate and compare test results
        shell: bash
        run: |
          find ./artifacts -name "*.json" -exec cat {} + > all-results.json
          # Optionally, add custom aggregation/comparison logic here

      - name: Upload aggregated results
        uses: actions/upload-artifact@v4
        with:
          name: aggregated-test-results
          path: all-results.json

      - name: Notify Results (GitHub API)
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -d '{"state": "success", "context": "Test Matrix", "description": "Matrix tests complete."}'
