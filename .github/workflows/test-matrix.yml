name: Test Matrix

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  matrix-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, macos-latest, windows-latest] # Example OS matrix
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.1.0
        with:
          pixi-version: latest
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # This is likely the line 93 that was failing.
        run: pixi run ci-dev # Changed from 'dev' to 'ci-dev' for CI environment

      - name: Run tests
        run: pixi run ci-test
