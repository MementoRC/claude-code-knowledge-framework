name: Quality Metrics & Coverage

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHON_VERSION: "3.10"
      PIXI_ENV: ci # Ensure pixi targets the 'ci' environment
    steps:
      - uses: actions/checkout@v4
      - name: Setup pixi with cache fallback
        id: setup-pixi
        uses: prefix-dev/setup-pixi@v0.8.10
        with:
          pixi-version: v0.49.0
          cache: false  # Temporarily disable during GitHub cache service outage
          manifest-path: pyproject.toml
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y git

      - name: Install dependencies (pixi) with retry and fallback
        run: |
          n=0
          until [ "$n" -ge 3 ]
          do
            # Install default environment with all dependencies
            if pixi install --verbose; then
              echo "✅ Installation successful"
              break
            elif [ "$n" -eq 2 ]; then
              echo "⚠️ Install failed, retrying..."
              pixi install --verbose && break
            fi
            n=$((n+1))
            echo "pixi install failed, retrying ($n/3)..."
            sleep 5
          done

      - name: Activate pixi environment
        run: |
          eval "$(pixi shell --env-hook bash)"

      - name: Install project dependencies
        run: |
          pixi run install-editable

      - name: Run tests with coverage (HTML, XML, JSON, Markdown)
        run: |
          # Install missing packages if needed
          pixi run pip install pytest-json-report pytest-html coverage || true
          
          # Run tests using pixi to ensure environment is properly set
          pixi run pytest tests/ --cov=src/uckn --cov-report=html --cov-report=xml --cov-report=json --cov-report=term --cov-report=term-missing --json-report --json-report-file=pytest-report.json --html=pytest-report.html --self-contained-html
          pixi run python -m coverage markdown
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.xml
            coverage.json
            coverage.md
            .coverage*
            pytest-report.json
            pytest-report.html
      - name: Install diff-cover separately (PR only)
        if: github.event_name == 'pull_request'
        run: |
          # Install diff-cover separately to avoid dependency resolution issues
          pixi run pip install diff-cover

      - name: diff-cover analysis (PR only)
        if: github.event_name == 'pull_request'
        run: |
          # Use pixi environment to run diff-cover
          git fetch origin main:refs/remotes/origin/main
          pixi run diff-cover coverage.xml --compare-branch=origin/main --fail-under=40 --html-report diffcover.html --markdown-report diffcover.md --json-report diffcover.json
      - name: Upload diff-cover artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: diffcover-reports
          path: |
            diffcover.html
            diffcover.md
            diffcover.json
      - name: Comment PR with coverage summary
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage.md
      - name: Quality Gate
        run: |
          echo "✅ Quality gate temporarily disabled - focusing on core test stability"
          # TODO: Re-enable after coverage improvements
          # pixi run -e ci quality-gate
