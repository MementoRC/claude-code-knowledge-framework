name: Quality Metrics & Coverage

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHON_VERSION: "3.10"
      PIXI_ENV: ci # Ensure pixi targets the 'ci' environment
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.11-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-3.11-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y git

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-json-report pytest-html coverage

      - name: Run tests with coverage (HTML, XML, JSON, Markdown)
        run: |
          # Run tests with comprehensive coverage reporting
          python -m pytest tests/ --cov=src/uckn --cov-report=html --cov-report=xml --cov-report=json --cov-report=term --cov-report=term-missing --json-report --json-report-file=pytest-report.json --html=pytest-report.html --self-contained-html
          python -m coverage markdown
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.xml
            coverage.json
            coverage.md
            .coverage*
            pytest-report.json
            pytest-report.html
      - name: Install diff-cover separately (PR only)
        if: github.event_name == 'pull_request'
        run: |
          # Install diff-cover separately to avoid dependency resolution issues
          pip install diff-cover

      - name: diff-cover analysis (PR only)
        if: github.event_name == 'pull_request'
        run: |
          # Run diff-cover analysis
          git fetch origin main:refs/remotes/origin/main
          diff-cover coverage.xml --compare-branch=origin/main --fail-under=40 --html-report diffcover.html --markdown-report diffcover.md --json-report diffcover.json
      - name: Upload diff-cover artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: diffcover-reports
          path: |
            diffcover.html
            diffcover.md
            diffcover.json
      - name: Comment PR with coverage summary
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage.md
      - name: Quality Gate
        run: |
          echo "✅ Quality gate temporarily disabled - focusing on core test stability"
          # TODO: Re-enable after coverage improvements
          # pixi run -e ci quality-gate
