name: PR Checks

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.1.0
        with:
          pixi-version: latest
          python-version: '3.10'

      - name: Install dependencies
        run: pixi run ci-dev # Changed from 'dev' to 'ci-dev' for CI environment

      - name: Run lint
        run: pixi run ci-lint

      - name: Run format check
        run: pixi run ci-format-check

      - name: Run quick tests
        run: pixi run ci-test
